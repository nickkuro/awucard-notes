<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/16.3.0/lib/marked.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.2.7/purify.min.js"></script>
<style>
  :root[data-theme="dark"] {
    --bg: #14181c; --surface: #1b2126; --surface-raised: #222a30; --border: #2b333a;
    --ink: #ece8e1; --ink-muted: #8b939b; --accent: #e8a33d; --accent-ink: #1b130a;
    --teal: #4fa8a0; --danger: #c9605a; --shadow: rgba(0,0,0,0.45); --hole: #14181c;
  }
  :root[data-theme="light"] {
    --bg: #e7e8e2; --surface: #f6f6f2; --surface-raised: #ffffff; --border: #d5d6ce;
    --ink: #20242a; --ink-muted: #6b7077; --accent: #c9842f; --accent-ink: #fff8ec;
    --teal: #2f8f87; --danger: #b23b3b; --shadow: rgba(20,20,15,0.12); --hole: #e7e8e2;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--ink); height: 100vh; overflow: hidden; }
  button, input, textarea { font-family: inherit; color: inherit; background: none; border: none; }
  button { cursor: pointer; }
  button:focus-visible, input:focus-visible, textarea:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .mono { font-family: 'IBM Plex Mono', monospace; }

  /* ---------- Login screen ---------- */
  .login-screen {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg); z-index: 100;
  }
  .login-card {
    text-align: center;
    padding: 40px 36px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    max-width: 320px;
  }
  .login-card .brand-mark { font-size: 28px; color: var(--accent); display: block; margin-bottom: 6px; }
  .login-card h1 { font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.12em; font-size: 18px; margin: 0 0 8px; }
  .login-card p { color: var(--ink-muted); font-size: 13px; line-height: 1.6; margin: 0 0 24px; }
  .discord-btn {
    display: inline-flex; align-items: center; gap: 10px;
    background: #5865F2; color: #fff;
    padding: 11px 18px; border-radius: 7px;
    font-weight: 600; font-size: 14px;
  }
  .discord-btn:hover { filter: brightness(1.08); }
  .login-error { color: var(--danger); font-size: 12px; margin-top: 14px; }

  .app { display: none; height: 100vh; width: 100vw; }
  .app.ready { display: flex; }

  /* ---------- Sidebar ---------- */
  .sidebar { width: 340px; min-width: 340px; background: var(--bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; height: 100vh; }
  .sidebar-head { display: flex; align-items: center; justify-content: space-between; padding: 18px 16px 12px; }
  .brand { display: flex; align-items: baseline; gap: 8px; }
  .brand-mark { color: var(--accent); font-size: 18px; }
  .brand-name { font-family: 'IBM Plex Mono', monospace; font-weight: 600; letter-spacing: 0.12em; font-size: 14px; }
  .head-actions { display: flex; gap: 4px; align-items: center; }
  .icon-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 6px; color: var(--ink-muted); }
  .icon-btn:hover { background: var(--surface); color: var(--ink); }
  .icon-btn svg { width: 16px; height: 16px; }

  .user-row { display: flex; align-items: center; gap: 10px; padding: 0 16px 14px; }
  .user-row img { width: 26px; height: 26px; border-radius: 50%; background: var(--surface); }
  .user-row .avatar-fallback { width: 26px; height: 26px; border-radius: 50%; background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 11px; font-family: 'IBM Plex Mono', monospace; color: var(--ink-muted); }
  .user-row span { font-size: 12.5px; color: var(--ink-muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .search-row { padding: 0 16px 10px; }
  .search-row input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; font-size: 13px; }
  .search-row input::placeholder { color: var(--ink-muted); }

  .tag-row { padding: 0 16px 10px; display: flex; flex-wrap: wrap; gap: 6px; }
  .tag-chip { font-family: 'IBM Plex Mono', monospace; font-size: 11px; padding: 3px 8px; border-radius: 100px; border: 1px solid var(--border); color: var(--ink-muted); line-height: 1.4; white-space: nowrap; }
  .tag-chip.active { border-color: var(--accent); color: var(--ink); background: var(--surface); }

  .note-list { flex: 1; overflow-y: auto; padding: 4px 14px 14px; }
  .note-card { position: relative; background: var(--surface); border: 1px solid var(--border); border-left: 4px solid var(--border); border-radius: 5px; padding: 11px 14px; margin-bottom: 8px; }
  .note-card::after { content: ""; position: absolute; top: 9px; right: 9px; width: 6px; height: 6px; border-radius: 50%; background: var(--hole); border: 1px solid var(--border); }
  .note-card.active { background: var(--surface-raised); border-color: var(--accent); box-shadow: 0 2px 10px var(--shadow); }
  .note-card-title { font-weight: 600; font-size: 14px; margin: 0 22px 4px 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .note-card-title.untitled { color: var(--ink-muted); font-weight: 400; font-style: italic; }
  .note-card-snippet { font-size: 12.5px; color: var(--ink-muted); margin: 0 0 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .note-card-meta { display: flex; justify-content: space-between; align-items: center; font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; color: var(--ink-muted); }
  .note-card-tags { display: flex; gap: 4px; overflow: hidden; }
  .note-card-tags span { white-space: nowrap; }

  .new-note-btn { margin: 0 16px 16px; padding: 10px; border-radius: 6px; background: var(--accent); color: var(--accent-ink); font-weight: 600; font-size: 13px; text-align: center; }
  .new-note-btn:hover { filter: brightness(1.06); }
  .empty-list { padding: 30px 16px; color: var(--ink-muted); font-size: 13px; line-height: 1.6; text-align: center; }

  /* ---------- Editor ---------- */
  .editor { flex: 1; display: flex; flex-direction: column; height: 100vh; min-width: 0; }
  .editor-empty { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--ink-muted); font-size: 14px; text-align: center; padding: 0 30px; }
  .editor-head { padding: 16px 28px 10px; border-bottom: 1px solid var(--border); }
  .editor-toprow { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .back-btn { display: none; color: var(--ink-muted); }
  .title-input { flex: 1; font-size: 22px; font-weight: 600; background: none; }
  .title-input::placeholder { color: var(--ink-muted); font-weight: 400; }
  .delete-btn { color: var(--ink-muted); }
  .delete-btn:hover { color: var(--danger); }

  .tag-editor { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 10px; }
  .tag-editor .tag-chip-edit { display: flex; align-items: center; gap: 6px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; padding: 3px 6px 3px 9px; border-radius: 100px; background: var(--surface); border: 1px solid var(--border); }
  .tag-chip-edit button { color: var(--ink-muted); font-size: 13px; line-height: 1; padding: 0 2px; }
  .tag-chip-edit button:hover { color: var(--danger); }
  .tag-input { font-family: 'IBM Plex Mono', monospace; font-size: 11px; min-width: 90px; padding: 4px 2px; color: var(--ink-muted); }

  .editor-bottomrow { display: flex; justify-content: space-between; align-items: center; }
  .mode-tabs { display: flex; gap: 2px; }
  .mode-tab { font-family: 'IBM Plex Mono', monospace; font-size: 11px; padding: 5px 11px; border-radius: 5px; color: var(--ink-muted); letter-spacing: 0.04em; }
  .mode-tab.active { background: var(--surface); color: var(--ink); }
  .status-line { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--ink-muted); }

  .editor-body { flex: 1; overflow-y: auto; padding: 20px 28px 40px; }
  .body-textarea { width: 100%; height: 100%; min-height: 300px; resize: none; font-family: 'IBM Plex Mono', monospace; font-size: 14px; line-height: 1.7; }
  .body-textarea::placeholder { color: var(--ink-muted); }

  .preview-content { font-size: 15px; line-height: 1.75; max-width: 680px; }
  .preview-content h1, .preview-content h2, .preview-content h3 { font-family: 'IBM Plex Mono', monospace; margin-top: 1.4em; }
  .preview-content code { font-family: 'IBM Plex Mono', monospace; background: var(--surface); padding: 2px 5px; border-radius: 4px; font-size: 0.9em; }
  .preview-content pre { background: var(--surface); padding: 12px 14px; border-radius: 6px; overflow-x: auto; border: 1px solid var(--border); }
  .preview-content pre code { background: none; padding: 0; }
  .preview-content blockquote { border-left: 3px solid var(--accent); margin: 0.8em 0; padding-left: 14px; color: var(--ink-muted); }
  .preview-content a { color: var(--teal); }
  .preview-content ul, .preview-content ol { padding-left: 22px; }
  .preview-empty { color: var(--ink-muted); font-style: italic; }

  .settings-menu { position: absolute; top: 52px; right: 16px; background: var(--surface-raised); border: 1px solid var(--border); border-radius: 6px; box-shadow: 0 6px 20px var(--shadow); min-width: 170px; z-index: 30; overflow: hidden; }
  .settings-menu button { display: block; width: 100%; text-align: left; padding: 10px 14px; font-size: 13px; }
  .settings-menu button:hover { background: var(--surface); }
  .settings-menu button.danger { color: var(--danger); }
  .hidden { display: none !important; }

  .confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 50; }
  .confirm-box { background: var(--surface-raised); border: 1px solid var(--border); border-radius: 8px; padding: 20px 22px; max-width: 320px; box-shadow: 0 10px 30px var(--shadow); }
  .confirm-box p { margin: 0 0 16px; font-size: 14px; line-height: 1.5; }
  .confirm-actions { display: flex; justify-content: flex-end; gap: 8px; }
  .confirm-actions button { padding: 7px 14px; border-radius: 5px; font-size: 13px; font-weight: 500; }
  .btn-cancel { background: var(--surface); border: 1px solid var(--border); }
  .btn-danger { background: var(--danger); color: #fff; }

  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--surface-raised); border: 1px solid var(--border); padding: 9px 16px; border-radius: 6px; font-size: 13px; box-shadow: 0 6px 18px var(--shadow); z-index: 60; }

  @media (prefers-reduced-motion: no-preference) {
    .note-card, .tag-chip, .icon-btn, .mode-tab, .new-note-btn { transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease; }
    .confirm-overlay { animation: fadeIn 0.12s ease; }
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  @media (max-width: 760px) {
    .app { position: relative; overflow: hidden; }
    .sidebar, .editor { width: 100%; min-width: 100%; flex: 0 0 100%; }
    .editor { position: absolute; top: 0; left: 100%; transition: left 0.2s ease; background: var(--bg); }
    .app.show-editor .editor { left: 0; }
    .app.show-editor .sidebar { display: none; }
    .back-btn { display: flex; }
    .editor-head { padding: 14px 18px 8px; }
    .editor-body { padding: 16px 18px 30px; }
  }
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <span class="brand-mark mono">¶</span>
    <h1>LEDGER</h1>
    <p>Log in with Discord to read and write your own entries.</p>
    <a class="discord-btn" href="/auth/discord">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.369a19.79 19.79 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.6 12.6 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.056 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.2 14.2 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.1 13.1 0 0 1-1.872-.892.077.077 0 0 1-.008-.128c.126-.094.252-.192.372-.291a.074.074 0 0 1 .078-.01c3.927 1.793 8.18 1.793 12.061 0a.073.073 0 0 1 .079.009c.12.099.246.198.373.292a.077.077 0 0 1-.006.127 12.3 12.3 0 0 1-1.873.892.076.076 0 0 0-.04.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.84 19.84 0 0 0 6.001-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.06.06 0 0 0-.031-.028M8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.955 2.418-2.157 2.418m7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418"/></svg>
      Continue with Discord
    </a>
    <div class="login-error hidden" id="loginError"></div>
  </div>
</div>

<div class="app" id="app">
  <aside class="sidebar">
    <div class="sidebar-head">
      <div class="brand">
        <span class="brand-mark mono">¶</span>
        <span class="brand-name">LEDGER</span>
      </div>
      <div class="head-actions" style="position: relative;">
        <button class="icon-btn" id="themeToggle" aria-label="Toggle theme"></button>
        <button class="icon-btn" id="settingsToggle" aria-label="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
        <div class="settings-menu hidden" id="settingsMenu">
          <button id="clearAllBtn" class="danger">Clear all entries</button>
          <button id="logoutBtn">Log out</button>
        </div>
      </div>
    </div>
    <div class="user-row" id="userRow"></div>
    <div class="search-row">
      <input type="text" id="searchInput" placeholder="Search entries…" />
    </div>
    <div class="tag-row" id="tagRow"></div>
    <div class="note-list" id="noteList"></div>
    <button class="new-note-btn" id="newNoteBtn">+ New entry</button>
  </aside>

  <main class="editor" id="editor"></main>
</div>

<div class="confirm-overlay hidden" id="confirmOverlay">
  <div class="confirm-box">
    <p id="confirmText"></p>
    <div class="confirm-actions">
      <button class="btn-cancel" id="confirmCancel">Cancel</button>
      <button class="btn-danger" id="confirmOk">Delete</button>
    </div>
  </div>
</div>

<div class="toast hidden" id="toast"></div>

<script>
(function () {
  "use strict";

  var TAG_PALETTE = ["#e8a33d", "#4fa8a0", "#c97b8e", "#7c8cc9", "#9bb05a", "#cf9bd6"];

  var state = {
    theme: localStorage.getItem("ledger-theme") || "dark",
    notes: {},
    selectedId: null,
    search: "",
    activeTags: new Set(),
    mode: "write",
    user: null
  };
  var saveStatus = {}; // per-note id -> 'saving' | 'saved' | 'error'
  var saveTimers = {}; // per-note id debounce timers

  document.documentElement.setAttribute("data-theme", state.theme);

  // ---------- utilities ----------
  function esc(s) { var d = document.createElement("div"); d.textContent = s || ""; return d.innerHTML; }
  function tagColor(tag) { var sum = 0; for (var i = 0; i < tag.length; i++) sum += tag.charCodeAt(i); return TAG_PALETTE[sum % TAG_PALETTE.length]; }
  function relTime(ts) {
    if (!ts) return "";
    var diff = Date.now() - ts, m = Math.floor(diff / 60000);
    if (m < 1) return "just now";
    if (m < 60) return m + "m ago";
    var h = Math.floor(m / 60);
    if (h < 24) return h + "h ago";
    var d = Math.floor(h / 24);
    if (d < 7) return d + "d ago";
    return new Date(ts).toLocaleDateString(undefined, { month: "short", day: "numeric" });
  }
  function snippet(body) {
    var s = (body || "").replace(/[#*_`>~-]/g, "").replace(/\s+/g, " ").trim();
    return s.length > 90 ? s.slice(0, 90) + "…" : s;
  }
  function wordCount(body) { var t = (body || "").trim(); return t ? t.split(/\s+/).length : 0; }

  function api(url, opts) {
    return fetch(url, Object.assign({ headers: { "Content-Type": "application/json" } }, opts))
      .then(function (r) {
        if (r.status === 401) { showLogin(); throw new Error("not logged in"); }
        if (!r.ok) throw new Error("request failed");
        return r.status === 204 ? null : r.json();
      });
  }

  // ---------- boot ----------
  function showLogin() {
    document.getElementById("loginScreen").classList.remove("hidden");
    document.getElementById("app").classList.remove("ready");
  }
  function showApp() {
    document.getElementById("loginScreen").classList.add("hidden");
    document.getElementById("app").classList.add("ready");
  }

  function boot() {
    api("/api/me").then(function (user) {
      state.user = user;
      renderUserRow();
      return api("/api/notes");
    }).then(function (notesArr) {
      state.notes = {};
      notesArr.forEach(function (n) { state.notes[n.id] = n; });
      showApp();
      render();
    }).catch(function () { /* showLogin already triggered by api() on 401 */ });
  }

  // ---------- mutations ----------
  function createNote() {
    api("/api/notes", { method: "POST", body: JSON.stringify({ title: "", body: "", tags: [] }) })
      .then(function (note) {
        state.notes[note.id] = note;
        state.selectedId = note.id;
        state.mode = "write";
        render();
        document.getElementById("app").classList.add("show-editor");
        var titleEl = document.querySelector(".title-input");
        if (titleEl) titleEl.focus();
      });
  }

  function scheduleSave(note) {
    saveStatus[note.id] = "saving";
    renderStatusOnly();
    clearTimeout(saveTimers[note.id]);
    saveTimers[note.id] = setTimeout(function () {
      api("/api/notes/" + note.id, {
        method: "PUT",
        body: JSON.stringify({ title: note.title, body: note.body, tags: note.tags })
      }).then(function () {
        saveStatus[note.id] = "saved";
        renderStatusOnly();
      }).catch(function () {
        saveStatus[note.id] = "error";
        renderStatusOnly();
      });
    }, 500);
  }

  function deleteNote(id) {
    api("/api/notes/" + id, { method: "DELETE" }).then(function () {
      delete state.notes[id];
      if (state.selectedId === id) state.selectedId = null;
      document.getElementById("app").classList.remove("show-editor");
      render();
    });
  }

  function clearAll() {
    api("/api/notes", { method: "DELETE" }).then(function () {
      state.notes = {};
      state.selectedId = null;
      document.getElementById("app").classList.remove("show-editor");
      render();
    });
  }

  function logout() {
    api("/auth/logout", { method: "POST" }).then(function () {
      state.notes = {};
      state.selectedId = null;
      state.user = null;
      showLogin();
    });
  }

  // ---------- rendering ----------
  function getFiltered() {
    var arr = Object.values(state.notes);
    var q = state.search.trim().toLowerCase();
    if (q) {
      arr = arr.filter(function (n) {
        return (n.title || "").toLowerCase().indexOf(q) > -1 ||
               (n.body || "").toLowerCase().indexOf(q) > -1 ||
               n.tags.some(function (t) { return t.indexOf(q) > -1; });
      });
    }
    if (state.activeTags.size) {
      arr = arr.filter(function (n) { return n.tags.some(function (t) { return state.activeTags.has(t); }); });
    }
    arr.sort(function (a, b) { return b.updatedAt - a.updatedAt; });
    return arr;
  }

  function allTags() {
    var set = new Set();
    Object.values(state.notes).forEach(function (n) { n.tags.forEach(function (t) { set.add(t); }); });
    return Array.from(set).sort();
  }

  function renderUserRow() {
    var row = document.getElementById("userRow");
    if (!state.user) { row.innerHTML = ""; return; }
    var img = state.user.avatar
      ? '<img src="' + esc(state.user.avatar) + '" alt="" />'
      : '<div class="avatar-fallback">' + esc((state.user.username || "?")[0].toUpperCase()) + "</div>";
    row.innerHTML = img + "<span>" + esc(state.user.username) + "</span>";
  }

  function render() {
    renderTagRow();
    renderList();
    renderEditor();
    var icon = state.theme === "dark"
      ? '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>'
      : '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>';
    document.getElementById("themeToggle").innerHTML = icon;
  }

  function renderTagRow() {
    var row = document.getElementById("tagRow");
    var tags = allTags();
    if (!tags.length) { row.innerHTML = ""; return; }
    row.innerHTML = tags.map(function (t) {
      var active = state.activeTags.has(t);
      return '<button class="tag-chip' + (active ? " active" : "") + '" data-tag="' + esc(t) + '">' + esc(t) + "</button>";
    }).join("");
    row.querySelectorAll(".tag-chip").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var t = btn.getAttribute("data-tag");
        if (state.activeTags.has(t)) state.activeTags.delete(t); else state.activeTags.add(t);
        render();
      });
    });
  }

  function renderList() {
    var list = document.getElementById("noteList");
    var total = Object.keys(state.notes).length;
    if (total === 0) { list.innerHTML = '<div class="empty-list">Nothing logged yet.<br>Start your first entry below.</div>'; return; }
    var filtered = getFiltered();
    if (filtered.length === 0) { list.innerHTML = '<div class="empty-list">No entries match that search.</div>'; return; }
    list.innerHTML = filtered.map(function (n) {
      var color = n.tags.length ? tagColor(n.tags[0]) : "var(--border)";
      var active = n.id === state.selectedId;
      var titleHtml = n.title ? '<p class="note-card-title">' + esc(n.title) + "</p>" : '<p class="note-card-title untitled">Untitled</p>';
      var tagsHtml = n.tags.slice(0, 3).map(function (t) { return '<span style="color:' + tagColor(t) + '">#' + esc(t) + "</span>"; }).join(" ");
      return '<div class="note-card' + (active ? " active" : "") + '" data-id="' + n.id + '" style="border-left-color:' + color + '">' +
        titleHtml + '<p class="note-card-snippet">' + (esc(snippet(n.body)) || "No text yet") + "</p>" +
        '<div class="note-card-meta"><span>' + relTime(n.updatedAt) + '</span><div class="note-card-tags">' + tagsHtml + "</div></div></div>";
    }).join("");
    list.querySelectorAll(".note-card").forEach(function (card) {
      card.addEventListener("click", function () {
        state.selectedId = card.getAttribute("data-id");
        state.mode = "write";
        render();
        document.getElementById("app").classList.add("show-editor");
      });
    });
  }

  function renderEditor() {
    var editor = document.getElementById("editor");
    var note = state.notes[state.selectedId];
    if (!note) { editor.innerHTML = '<div class="editor-empty">Select an entry from the list, or start a new one.</div>'; return; }

    var statusText = { saving: "Saving…", saved: "Saved", error: "Couldn't save — check your connection" }[saveStatus[note.id]] || "";
    var tagChips = note.tags.map(function (t) {
      return '<span class="tag-chip-edit" style="color:' + tagColor(t) + '">#' + esc(t) + '<button data-remove-tag="' + esc(t) + '" aria-label="Remove tag">×</button></span>';
    }).join("");

    editor.innerHTML =
      '<div class="editor-head"><div class="editor-toprow">' +
        '<button class="icon-btn back-btn" id="backBtn" aria-label="Back to list"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg></button>' +
        '<input class="title-input" id="titleInput" placeholder="Untitled entry" value="' + esc(note.title) + '" />' +
        '<button class="icon-btn delete-btn" id="deleteBtn" aria-label="Delete entry"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path></svg></button>' +
      "</div>" +
      '<div class="tag-editor" id="tagEditor">' + tagChips + '<input class="tag-input" id="tagInput" placeholder="+ tag" /></div>' +
      '<div class="editor-bottomrow"><div class="mode-tabs">' +
        '<button class="mode-tab' + (state.mode === "write" ? " active" : "") + '" data-mode="write">WRITE</button>' +
        '<button class="mode-tab' + (state.mode === "preview" ? " active" : "") + '" data-mode="preview">PREVIEW</button>' +
      "</div><div class=\"status-line\">" + wordCount(note.body) + " words · " + statusText + "</div></div></div>" +
      '<div class="editor-body" id="editorBody"></div>';

    var body = document.getElementById("editorBody");
    if (state.mode === "write") {
      body.innerHTML = '<textarea class="body-textarea" id="bodyTextarea" placeholder="Start writing…">' + esc(note.body) + "</textarea>";
      var ta = document.getElementById("bodyTextarea");
      ta.addEventListener("input", function () { note.body = ta.value; note.updatedAt = Date.now(); scheduleSave(note); renderList(); });
    } else {
      var html = note.body ? DOMPurify.sanitize(marked.parse(note.body)) : '<p class="preview-empty">Nothing to preview yet.</p>';
      body.innerHTML = '<div class="preview-content">' + html + "</div>";
    }

    document.getElementById("backBtn").addEventListener("click", function () { document.getElementById("app").classList.remove("show-editor"); });
    document.getElementById("titleInput").addEventListener("input", function (e) { note.title = e.target.value; note.updatedAt = Date.now(); scheduleSave(note); renderList(); });
    document.getElementById("deleteBtn").addEventListener("click", function () { openConfirm(note); });
    editor.querySelectorAll(".mode-tab").forEach(function (tab) { tab.addEventListener("click", function () { state.mode = tab.getAttribute("data-mode"); renderEditor(); }); });
    editor.querySelectorAll("[data-remove-tag]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        note.tags = note.tags.filter(function (x) { return x !== btn.getAttribute("data-remove-tag"); });
        scheduleSave(note); render();
      });
    });
    var tagInput = document.getElementById("tagInput");
    tagInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter" || e.key === ",") {
        e.preventDefault();
        var v = tagInput.value.trim().toLowerCase().replace(/,/g, "");
        if (v && note.tags.indexOf(v) === -1) { note.tags.push(v); scheduleSave(note); render(); document.getElementById("tagInput").focus(); }
        else tagInput.value = "";
      } else if (e.key === "Backspace" && !tagInput.value && note.tags.length) { note.tags.pop(); scheduleSave(note); render(); }
    });
  }

  function renderStatusOnly() {
    var el = document.querySelector(".status-line");
    var note = state.notes[state.selectedId];
    if (!el || !note) return;
    var statusText = { saving: "Saving…", saved: "Saved", error: "Couldn't save — check your connection" }[saveStatus[note.id]] || "";
    el.textContent = wordCount(note.body) + " words · " + statusText;
  }

  var pendingDeleteId = null;
  function openConfirm(note) { pendingDeleteId = note.id; document.getElementById("confirmText").textContent = "Delete \"" + (note.title || "Untitled") + "\"? This can't be undone."; document.getElementById("confirmOverlay").classList.remove("hidden"); }
  function closeConfirm() { pendingDeleteId = null; document.getElementById("confirmOverlay").classList.add("hidden"); }
  function showToast(msg) { var t = document.getElementById("toast"); t.textContent = msg; t.classList.remove("hidden"); setTimeout(function () { t.classList.add("hidden"); }, 2200); }

  document.getElementById("newNoteBtn").addEventListener("click", createNote);
  document.getElementById("searchInput").addEventListener("input", function (e) { state.search = e.target.value; renderList(); });
  document.getElementById("themeToggle").addEventListener("click", function () {
    state.theme = state.theme === "dark" ? "light" : "dark";
    localStorage.setItem("ledger-theme", state.theme);
    document.documentElement.setAttribute("data-theme", state.theme);
    render();
  });
  document.getElementById("settingsToggle").addEventListener("click", function () { document.getElementById("settingsMenu").classList.toggle("hidden"); });
  document.addEventListener("click", function (e) {
    var menu = document.getElementById("settingsMenu");
    if (!menu.contains(e.target) && e.target.id !== "settingsToggle") menu.classList.add("hidden");
  });
  document.getElementById("clearAllBtn").addEventListener("click", function () {
    document.getElementById("settingsMenu").classList.add("hidden");
    document.getElementById("confirmText").textContent = "Clear every entry you've written in Ledger? This can't be undone.";
    pendingDeleteId = "__ALL__";
    document.getElementById("confirmOverlay").classList.remove("hidden");
  });
  document.getElementById("logoutBtn").addEventListener("click", function () { document.getElementById("settingsMenu").classList.add("hidden"); logout(); });
  document.getElementById("confirmCancel").addEventListener("click", closeConfirm);
  document.getElementById("confirmOk").addEventListener("click", function () {
    if (pendingDeleteId === "__ALL__") { clearAll(); showToast("All entries cleared"); }
    else if (pendingDeleteId) { deleteNote(pendingDeleteId); showToast("Entry deleted"); }
    closeConfirm();
  });
  document.getElementById("confirmOverlay").addEventListener("click", function (e) { if (e.target.id === "confirmOverlay") closeConfirm(); });

  boot();
})();
</script>
</body>
</html>
